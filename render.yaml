services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: ordertocash-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # you will enter this manually in the Render dashboard

  # ── Frontend (Vite/React) ─────────────────────────────────────────────────
  - type: web
    name: ordertocash-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
